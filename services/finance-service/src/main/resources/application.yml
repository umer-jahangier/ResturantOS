server:
  port: ${SERVER_PORT:8086}

spring:
  application:
    name: finance-service
  datasource:
    url: ${FINANCE_DB_URL:jdbc:postgresql://localhost:5432/finance_db}
    username: ${FINANCE_DB_USER:finance_user}
    password: ${FINANCE_DB_PASSWORD:finance_pass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
  cloud:
    config:
      uri: ${CONFIG_URI:http://localhost:8888}
      fail-fast: false
      retry:
        max-attempts: 3

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

feign:
  client:
    config:
      default:
        connect-timeout: 5000
        read-timeout: 5000

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus

restaurantos:
  internal:
    secret: ${INTERNAL_SERVICE_SECRET:dev-internal-secret}
  jwks:
    uri: ${JWKS_URI:http://auth-service:8081/.well-known/jwks.json}
