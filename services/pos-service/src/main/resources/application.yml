server:
  port: ${SERVER_PORT:8084}

spring:
  application:
    name: pos-service
  config:
    import: optional:configserver:${CONFIG_URI:http://localhost:8888}
  datasource:
    url: ${POS_DB_URL:jdbc:postgresql://localhost:5432/pos_db}
    username: ${POS_DB_USER:pos_user}
    password: ${POS_DB_PASSWORD:pos_pass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:${RABBITMQ_USER:guest}}
    password: ${RABBITMQ_PASSWORD:guest}
  cloud:
    config:
      uri: ${CONFIG_URI:http://localhost:8888}
      fail-fast: false
      retry:
        max-attempts: 3
    openfeign:
      circuitbreaker:
        enabled: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

feign:
  client:
    config:
      default:
        connect-timeout: 5000
        read-timeout: 5000

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus

restaurantos:
  internal:
    secret: ${INTERNAL_SERVICE_SECRET:dev-internal-secret}
  # Source of truth for @RequiresFeature checks — shared-lib resolves a feature-flag cache miss
  # from platform-admin (which owns tenant_features). Without it every gated endpoint 403s.
  platform-admin:
    uri: ${PLATFORM_ADMIN_URI:http://127.0.0.1:8096}
  jwks:
    uri: ${JWKS_URI:http://auth-service:8081/.well-known/jwks.json}
  opa:
    url: ${OPA_URL}
