server:
  port: ${SERVER_PORT:8090}

spring:
  application:
    name: kitchen-service
  config:
    import: optional:configserver:${CONFIG_URI:http://localhost:8888}
  datasource:
    url: ${KITCHEN_DB_URL:jdbc:postgresql://localhost:5432/kitchen_db}
    username: ${KITCHEN_DB_USER:kitchen_user}
    password: ${KITCHEN_DB_PASSWORD:kitchen_pass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:${RABBITMQ_USER:guest}}
    password: ${RABBITMQ_PASSWORD:guest}
    listener:
      simple:
        # AUTO (container-managed ack): ack on success, nack on exception. Was 'manual', but no
        # consumer ever called basicAck, so messages piled up unacked and redelivered forever — and
        # retry/DLQ never fired. AUTO + retry + default-requeue-rejected=false = success acks & clears,
        # failure retries then dead-letters to restaurantos.dlx (the <queue>.dlq bound in definitions).
        acknowledge-mode: auto
        default-requeue-rejected: false
        retry:
          enabled: true
          initial-interval: 2000
          max-attempts: 3
          multiplier: 2.0
          max-interval: 8000
  cloud:
    config:
      uri: ${CONFIG_URI:http://localhost:8888}
      fail-fast: false
      retry:
        max-attempts: 3
    openfeign:
      circuitbreaker:
        enabled: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus

restaurantos:
  internal:
    secret: ${INTERNAL_SERVICE_SECRET:dev-internal-secret}
  jwks:
    uri: ${JWKS_URI:http://auth-service:8081/.well-known/jwks.json}
  opa:
    url: ${OPA_URL}
