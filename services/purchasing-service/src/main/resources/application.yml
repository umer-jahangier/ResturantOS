server:
  port: ${SERVER_PORT:8087}

spring:
  application:
    name: purchasing-service
  config:
    import: optional:configserver:${CONFIG_URI:http://localhost:8888}
  datasource:
    url: ${PURCHASING_DB_URL:jdbc:postgresql://localhost:5432/purchasing_db}
    username: ${PURCHASING_DB_USER:purchasing_user}
    password: ${PURCHASING_DB_PASSWORD:purchasing_pass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
  # Required by shared-lib's RedisFeatureFlagService, which backs @RequiresFeature on every
  # purchasing controller. Without this block Spring defaults to localhost:6379 with no password,
  # the connection is refused, and EVERY purchasing endpoint fails with a 500.
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:${RABBITMQ_USER:guest}}
    password: ${RABBITMQ_PASSWORD:guest}
  cloud:
    config:
      uri: ${CONFIG_URI:http://localhost:8888}
      fail-fast: false

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus

restaurantos:
  internal:
    secret: ${INTERNAL_SERVICE_SECRET:dev-internal-secret}
  # Source of truth for @RequiresFeature checks — shared-lib resolves a feature-flag cache miss
  # from platform-admin (which owns tenant_features). Without it every gated endpoint 403s.
  platform-admin:
    uri: ${PLATFORM_ADMIN_URI:http://127.0.0.1:8096}
  jwks:
    uri: ${JWKS_URI:http://auth-service:8081/.well-known/jwks.json}
  # REQUIRED. Vendor bank accounts are stored field-encrypted (PUR-01) via shared-lib's opt-in
  # EncryptionAutoConfiguration (decision 02-02). If this resolves to blank/unset, the service
  # refuses to start (see EncryptionRequiredConfig) rather than silently dropping bank accounts.
  # The default below is a DEV-ONLY key — every real environment must override FIELD_ENCRYPTION_KEY.
  encryption:
    key: ${FIELD_ENCRYPTION_KEY:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}
  inventory:
    integration-mode: ${INVENTORY_INTEGRATION_MODE:mock}
