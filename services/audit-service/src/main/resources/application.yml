server:
  port: ${SERVER_PORT:8093}

spring:
  application:
    name: audit-service
  datasource:
    url: ${AUDIT_DB_URL:jdbc:postgresql://localhost:5432/audit_db}
    # Runtime user: INSERT-only on audit_events (no UPDATE/DELETE grants)
    username: ${AUDIT_DB_USER:audit_writer}
    password: ${AUDIT_DB_PASSWORD:audit_pass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  liquibase:
    # Liquibase runs as admin user for DDL (separate from runtime datasource)
    url: ${AUDIT_DB_ADMIN_URL:${AUDIT_DB_URL:jdbc:postgresql://localhost:5432/audit_db}}
    user: ${AUDIT_DB_ADMIN_USER:audit_admin}
    password: ${AUDIT_DB_ADMIN_PASSWORD:audit_admin_pass}
    change-log: classpath:db/changelog/db.changelog-master.xml
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:${RABBITMQ_USER:guest}}
    password: ${RABBITMQ_PASSWORD:guest}
    listener:
      simple:
        acknowledge-mode: manual

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus

restaurantos:
  internal:
    secret: ${INTERNAL_SERVICE_SECRET:dev-internal-secret}
