# Nginx TLS terminator for RestaurantOS gateway.
#
# Responsibilities:
#   1. Terminate TLS at 443 (cert paths injected at deploy time via env or volume mount)
#   2. Redirect plain HTTP (80) → HTTPS (443)
#   3. Forward real client IP to gateway via X-Forwarded-For so per-IP rate limiting works
#      (Spring Cloud Gateway requires trusted-proxies to be set — see application.yml)
#
# Cert provisioning (deploy-time concern, not committed):
#   Development:  Use mkcert or a self-signed cert
#   Staging/Prod: Use Certbot (Let's Encrypt) or mount cloud-managed TLS certificates
#   The cert paths below are placeholders; replace with actual paths or Docker secrets.

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Log format includes the upstream response time for latency monitoring
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" rt=$request_time';

    access_log  /var/log/nginx/access.log  main;

    # ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS TLS terminator ─────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name _;

        # Deploy-time: replace these paths with actual certificate and key paths.
        # Docker Compose example: mount from ./certs/ volume.
        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;

        location / {
            proxy_pass         http://gateway:8080;

            # Pass real client IP — CRITICAL for per-IP rate limiting.
            # Spring Cloud Gateway reads X-Forwarded-For when trusted-proxies is configured.
            proxy_set_header   X-Forwarded-For   $remote_addr;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;

            # Clear any upstream X-Forwarded-For chains from untrusted clients
            # (gateway's trusted-proxies config handles further validation)
            proxy_set_header   X-Original-Forwarded-For $http_x_forwarded_for;

            proxy_http_version 1.1;
            proxy_set_header   Connection "";

            # Timeouts — gateway handles circuit breaking; give upstreams time to respond
            proxy_connect_timeout  5s;
            proxy_send_timeout     60s;
            proxy_read_timeout     60s;

            # Buffer settings for streaming responses
            proxy_buffering off;
        }

        # Health check endpoint for load balancer probes (no auth needed)
        location /actuator/health {
            proxy_pass         http://gateway:8080/actuator/health;
            proxy_set_header   X-Forwarded-For   $remote_addr;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Host              $host;
        }
    }
}
