# Test application properties for shared-lib integration tests.
# Datasource/Redis/RabbitMQ are overridden by DynamicPropertySource in BaseIntegrationTest.
spring.application.name=shared-lib-test
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.liquibase.enabled=true
spring.task.scheduling.enabled=false

# Disable security auto-configuration in test harness
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration,\
  org.springframework.boot.autoconfigure.security.servlet.SecurityFilterAutoConfiguration

# No OPA in test (optional via @ConditionalOnProperty)
# restaurantos.opa.url is intentionally unset

restaurantos.feature-flags.cache-ttl-seconds=300
