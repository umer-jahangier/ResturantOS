name: CI

# INFRA-05 / SC4: lint -> test -> build(signed) -> schema-sync as a single automated
# pipeline with NO manual intervention in the core path. The only manual gate is
# promote-to-prod (environment: production), which is a deliberate GitHub approval
# BY DESIGN (D6, spec D1.4) and is NOT part of the automated core.
on:
  pull_request: {}
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  JAVA_VERSION: "25"
  NODE_VERSION: "22"
  OPA_VERSION: "1.17.0"

jobs:
  # ---------------------------------------------------------------------------
  # lint: Java static analysis + frontend eslint/prettier/tsc (FE-08 enforced in CI)
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (Java static analysis + frontend eslint/prettier/tsc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }} (Temurin) + Maven cache
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      # Java static analysis. checkstyle/spotbugs/pmd are NOT yet wired into the
      # parent POM (gap documented in 04-03-SUMMARY); we run what exists — a clean
      # compile across all modules — which fails the job on any compilation error.
      # Once the analysis plugins are wired, replace this with the dedicated goals:
      #   mvn -B -ntp checkstyle:check spotbugs:check pmd:check
      - name: Java static analysis (compile + any wired analysis)
        run: mvn -B -ntp -DskipTests verify

      - name: Enable Corepack (pnpm)
        run: corepack enable

      - name: Set up Node ${{ env.NODE_VERSION }} + pnpm store cache
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm --dir frontend install --frozen-lockfile

      - name: ESLint (FE-08 layer-boundary; a skip-layer import fails)
        run: pnpm --dir frontend run lint

      - name: Prettier --check
        run: pnpm --dir frontend run format:check

      - name: tsc --noEmit (zero any)
        run: pnpm --dir frontend exec tsc --noEmit

  # ---------------------------------------------------------------------------
  # test: data-driven per-area coverage gates (Java + frontend + OPA)
  #   finance/inventory >= 75, all other Java modules + frontend (Vitest) >= 60,
  #   OPA == 100. Thresholds are read from coverage-gates.json (Pitfall 9) so later
  #   phases raise gates WITHOUT editing this workflow.
  # ---------------------------------------------------------------------------
  test:
    name: Test (data-driven coverage gates)
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }} (Temurin) + Maven cache
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      # JUnit5 + Testcontainers. The GitHub-hosted runner has a working Docker
      # daemon (no Colima/Ryuk quirk), so Testcontainers runs unmodified.
      - name: Java tests + JaCoCo (mvn -Pcoverage verify)
        run: mvn -B -ntp -Pcoverage verify

      - name: Generate JaCoCo CSV reports
        run: mvn -B -ntp -Pcoverage org.jacoco:jacoco-maven-plugin:0.8.14:report

      # Data-driven per-module gate: parse each module's jacoco.csv and compare its
      # LINE coverage to the gate from coverage-gates.json (per-path override else
      # the java.default). finance/inventory entries are forward-declared (Phases 6/8).
      - name: Enforce Java per-module coverage gates
        run: |
          python3 - <<'PY'
          import csv, glob, json, sys, os
          gates = json.load(open(".github/workflows/coverage-gates.json"))["java"]
          default = gates["default"]
          failures = []
          csvs = glob.glob("**/target/site/jacoco/jacoco.csv", recursive=True)
          if not csvs:
              print("No jacoco.csv reports found — nothing to gate.")
          for path in csvs:
              module = path.split("/target/")[0]
              gate = gates.get(module, default)
              covered = missed = 0
              with open(path) as fh:
                  for row in csv.DictReader(fh):
                      covered += int(row["LINE_COVERED"])
                      missed += int(row["LINE_MISSED"])
              total = covered + missed
              pct = (covered / total * 100) if total else 100.0
              status = "OK" if pct >= gate else "FAIL"
              print(f"[{status}] {module}: {pct:.2f}% (gate {gate}%)")
              if pct < gate:
                  failures.append(f"{module}: {pct:.2f}% < {gate}%")
          if failures:
              print("Coverage gate failures:\n  " + "\n  ".join(failures))
              sys.exit(1)
          PY

      - name: Enable Corepack (pnpm)
        run: corepack enable

      - name: Set up Node ${{ env.NODE_VERSION }} + pnpm store cache
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm --dir frontend install --frozen-lockfile

      # Vitest coverage thresholds are enforced by frontend/vitest.config.ts, which
      # mirrors the "frontend" gate (60) in coverage-gates.json — the source of truth.
      - name: Frontend tests + coverage (Vitest, gate >= frontend)
        run: |
          FRONTEND_GATE=$(python3 -c "import json;print(json.load(open('.github/workflows/coverage-gates.json'))['frontend'])")
          echo "frontend coverage gate (coverage-gates.json) = ${FRONTEND_GATE}%"
          pnpm --dir frontend run test:coverage

      - name: Install OPA ${{ env.OPA_VERSION }}
        run: |
          curl -fsSL -o /usr/local/bin/opa \
            "https://openpolicyagent.org/downloads/v${OPA_VERSION}/opa_linux_amd64_static"
          chmod +x /usr/local/bin/opa
          opa version

      # OPA must be EXACTLY 100% policy coverage (SC4). Parse the JSON coverage field.
      - name: OPA policy tests (coverage must == 100)
        run: |
          opa test policies/ --coverage --format json > opa-coverage.json
          python3 - <<'PY'
          import json, sys
          cov = json.load(open("opa-coverage.json")).get("coverage")
          print(f"OPA coverage: {cov}%")
          if cov is None or float(cov) < 100.0:
              print("OPA policy coverage gate FAILED — must be exactly 100%.")
              sys.exit(1)
          PY

  # ---------------------------------------------------------------------------
  # schema-sync: typecheck the Zod schemas + best-effort OpenAPI<->Zod drift (D5).
  #   (a) tsc --noEmit confirms frontend/lib/api-client/schemas/** typecheck.
  #   (b) A maintained OpenAPI<->Zod diff tool was verified absent on npm at
  #       execution time (`openapi-to-zod-check` -> 404), so we ship a documented
  #       placeholder; the backend SpringDoc OpenAPI is a Phase-3+ dependency.
  # ---------------------------------------------------------------------------
  schema-sync:
    name: Schema sync (Zod typecheck + OpenAPI drift placeholder)
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable Corepack (pnpm)
        run: corepack enable

      - name: Set up Node ${{ env.NODE_VERSION }} + pnpm store cache
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm --dir frontend install --frozen-lockfile

      - name: Typecheck Zod schemas (frontend/lib/api-client/schemas/**)
        run: pnpm --dir frontend exec tsc --noEmit -p tsconfig.json

      - name: OpenAPI<->Zod drift check (D5b placeholder)
        run: |
          echo "schema-sync: OpenAPI<->Zod cross-repo diff deferred — backend SpringDoc OpenAPI is a Phase-3+ dependency."
          echo "(No maintained OpenAPI<->Zod diff tool verified on npm at execution time: openapi-to-zod-check -> 404.)"

  # ---------------------------------------------------------------------------
  # build: cosign-signed multi-arch (amd64+arm64) GHCR images (SC4, Pitfall 10).
  #   On pull_request: build WITHOUT push/sign (validate Dockerfiles only — keeps the
  #   core path green without registry creds on forks). On push/tags: push + sign.
  # ---------------------------------------------------------------------------
  build:
    name: Build & sign image (${{ matrix.image.name }})
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write # cosign keyless OIDC
    strategy:
      fail-fast: false
      matrix:
        image:
          - { name: eureka-server, context: ".", dockerfile: eureka-server/Dockerfile }
          - { name: config-server, context: ".", dockerfile: config-server/Dockerfile }
          - { name: auth-service, context: ".", dockerfile: services/auth-service/Dockerfile }
          - { name: authorization-service, context: ".", dockerfile: services/authorization-service/Dockerfile }
          - { name: gateway, context: ".", dockerfile: gateway/Dockerfile }
          - { name: user-service, context: ".", dockerfile: services/user-service/Dockerfile }
          - { name: platform-admin-service, context: ".", dockerfile: services/platform-admin-service/Dockerfile }
          - { name: frontend, context: frontend, dockerfile: frontend/Dockerfile }
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/restaurantos-${{ matrix.image.name }}
      # Push (and therefore sign) on everything except pull_request validation builds.
      PUSH: ${{ github.event_name != 'pull_request' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: env.PUSH == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags ({sha}, {semver}, {branch}-latest)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,format=short
            type=semver,pattern={{version}}
            type=raw,value=${{ github.ref_name }}-latest,enable=${{ github.event_name == 'push' && github.ref_type == 'branch' }}

      - name: Build (+ push on non-PR) multi-arch image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: ${{ env.PUSH }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Install cosign
        if: env.PUSH == 'true'
        uses: sigstore/cosign-installer@v3

      # Keyless OIDC signing of the pushed digest (Pitfall 10).
      - name: Sign image (cosign keyless OIDC)
        if: env.PUSH == 'true'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"

  # ---------------------------------------------------------------------------
  # e2e: Playwright scaffold + ONE smoke journey (D6/W1). Non-blocking: the full
  #   ~50-journey suite runs against STAGING and spans every later phase — it is
  #   explicitly NOT a Phase-4 deliverable.
  # ---------------------------------------------------------------------------
  e2e:
    name: E2E smoke (Playwright scaffold)
    needs: [build]
    runs-on: ubuntu-latest
    continue-on-error: true # scaffold only; full staging suite is cross-phase
    steps:
      - uses: actions/checkout@v4

      - name: Enable Corepack (pnpm)
        run: corepack enable

      - name: Set up Node ${{ env.NODE_VERSION }} + pnpm store cache
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm --dir frontend install --frozen-lockfile

      - name: Typecheck E2E sources (isolated e2e/tsconfig.json)
        run: pnpm --dir frontend exec tsc --noEmit -p e2e/tsconfig.json

      - name: Install Playwright browser (chromium)
        run: pnpm --dir frontend exec playwright install --with-deps chromium

      - name: Run Playwright smoke
        run: pnpm --dir frontend run e2e

  # ---------------------------------------------------------------------------
  # deploy-prod: PLACEHOLDER — the promote-to-prod gate is a DELIBERATE manual
  #   GitHub `environment: production` approval BY DESIGN (D6, spec D1.4). It is NOT
  #   part of the automated core (lint -> test -> build -> schema-sync) and performs
  #   NO real deploy here; the actual helm promotion lands in a later infra phase.
  # ---------------------------------------------------------------------------
  deploy-prod:
    name: Promote to production (manual approval placeholder)
    needs: [build, schema-sync]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production # GitHub manual approval gate (by design)
    steps:
      - name: Promotion placeholder
        run: echo "Manual production promotion gate — real helm promote is a later-phase deliverable (D6)."
